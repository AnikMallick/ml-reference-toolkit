name: Deploy to GitHub Pages

on:
  push:
    branches: [main]    # Runs automatically on every push to main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci              # Cleaner than npm install in CI environments

      - name: Build
        run: npm run build       # Vite outputs to the dist/ folder

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist             # Deploy the built output

      - name: Deploy
        uses: actions/deploy-pages@v4